<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delaware Crabbing Intelligence</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url("https://upload.wikimedia.org/wikipedia/commons/3/3c/Indian_River_Inlet_Bridge_Delaware.jpg") no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.65);
  padding: 20px;
}

.container {
  max-width: 1050px;
  margin: auto;
}

.header {
  background: rgba(0, 70, 90, 0.75);
  padding: 18px;
  border-radius: 14px;
  backdrop-filter: blur(8px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 12px;
  margin-top: 15px;
}

.card {
  background: rgba(0,0,0,0.55);
  padding: 15px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}

h2 {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 1px;
}

.big {
  font-size: 2.4rem;
  font-weight: bold;
}

.good { color: #4ade80; }
.mid { color: #facc15; }
.bad { color: #f87171; }

ul { list-style: none; padding: 0; }
li { margin: 6px 0; opacity: 0.9; }

.crab {
  width: 70px;
  margin-top: 10px;
}

footer {
  text-align: center;
  opacity: 0.6;
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="header">
  <h1>🦀 Delaware Crabbing Intelligence</h1>
  <p>Live NOAA tides + real weather + movement-based scoring</p>
</div>

<div class="grid">

  <div class="card">
    <h2>CRAB SCORE</h2>
    <div id="score" class="big">--</div>
    <div id="rating">Loading...</div>
    <img class="crab" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Blue_crab_Columbus_Crab.jpg">
  </div>

  <div class="card">
    <h2>WEATHER</h2>
    <ul id="weather"><li>Loading...</li></ul>
  </div>

  <div class="card">
    <h2>TEMPERATURE</h2>
    <div id="temp" class="big">--</div>
  </div>

  <div class="card">
    <h2>NOAA TIDES</h2>
    <ul id="tides"><li>Loading...</li></ul>
  </div>

  <div class="card">
    <h2>CRAB WINDOW</h2>
    <div id="window">Calculating...</div>
  </div>

</div>

<footer>
Built for Delaware Bay crabbing • NOAA + Open-Meteo
</footer>

</div>
</div>

<script>

// ===== LOCATION =====
const lat = 38.545;
const lon = -75.085;
const station = "8557380"; // Lewes, DE NOAA station

// ===== WEATHER (FIXED) =====
async function getWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,wind_speed_10m` +
      `&temperature_unit=fahrenheit&wind_speed_unit=mph`;

    const res = await fetch(url);
    const data = await res.json();

    const temp = data.current.temperature_2m;
    const wind = data.current.wind_speed_10m;

    document.getElementById("temp").innerText = temp + "°F";

    document.getElementById("weather").innerHTML = `
      <li>🌡️ ${temp}°F</li>
      <li>💨 ${wind} mph</li>
    `;

    return { temp, wind };

  } catch (e) {
    return { temp: 70, wind: 5 };
  }
}

// ===== TIDES (SAFE PARSE) =====
async function getTides() {
  try {
    const url =
      `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter` +
      `?product=predictions&station=${station}` +
      `&begin_date=today&end_date=today` +
      `&datum=MLLW&time_zone=lst_ldt&units=english&format=json`;

    const res = await fetch(url);
    const data = await res.json();

    return data.predictions || [];
  } catch (e) {
    return [];
  }
}

// ===== RENDER TIDES =====
function renderTides(tides) {
  if (!tides.length) {
    document.getElementById("tides").innerHTML =
      "<li>No tide data</li>";
    return;
  }

  let html = "";
  for (let i = 0; i < Math.min(6, tides.length); i++) {
    html += `<li>🌊 ${tides[i].t}</li>`;
  }

  document.getElementById("tides").innerHTML = html;
}

// ===== REAL CRAB SCORE (NO RANDOMNESS) =====
function crabScore(temp, wind, tides) {

  let score = 40;

  // temperature
  if (temp >= 65 && temp <= 85) score += 25;

  // wind
  if (wind < 10) score += 15;
  else score -= 10;

  // tide movement = real signal
  if (tides.length > 2) {
    for (let i = 1; i < tides.length; i++) {
      const t1 = new Date(tides[i-1].t);
      const t2 = new Date(tides[i].t);

      const diff = Math.abs(t2 - t1) / 60000;

      if (diff < 180) score += 3;
    }
  }

  score = Math.max(0, Math.min(100, Math.round(score)));

  let label = "OK";
  let color = "mid";

  if (score >= 70) {
    label = "GOOD";
    color = "good";
  } else if (score < 40) {
    label = "POOR";
    color = "bad";
  }

  document.getElementById("score").innerText = score;
  document.getElementById("rating").innerHTML =
    `<span class="${color}">${label}</span>`;
}

// ===== WINDOW =====
function windowLogic() {
  const h = new Date().getHours();

  let msg = "Moderate";

  if (h >= 5 && h <= 9) msg = "🔥 Morning bite";
  if (h >= 17 && h <= 21) msg = "🔥 Evening bite";
  if (h >= 10 && h <= 15) msg = "⚠️ Slow midday";

  document.getElementById("window").innerText = msg;
}

// ===== INIT =====
async function init() {
  const weather = await getWeather();
  const tides = await getTides();

  renderTides(tides);
  crabScore(weather.temp, weather.wind, tides);
  windowLogic();
}

init();

</script>

</body>
</html>
