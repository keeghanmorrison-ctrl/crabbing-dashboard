<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delaware Crabbing Intelligence</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0b1220, #0f172a);
    color: #e2e8f0;
  }

  header {
    padding: 20px;
    text-align: center;
    background: rgba(30, 41, 59, 0.9);
  }

  h1 { margin: 0; font-size: 26px; }

  .sub { opacity: 0.7; font-size: 13px; margin-top: 6px; }

  .container {
    max-width: 1000px;
    margin: auto;
    padding: 16px;
    display: grid;
    gap: 16px;
  }

  .grid2 {
    display: grid;
    gap: 16px;
  }

  @media (min-width: 800px) {
    .grid2 { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: rgba(30, 41, 59, 0.9);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .label { opacity: 0.7; font-size: 13px; margin-bottom: 6px; }

  .big { font-size: 34px; font-weight: bold; }

  .row {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    opacity: 0.85;
  }

  .status {
    font-size: 20px;
    font-weight: bold;
    margin-top: 8px;
  }

  .go { color: #22c55e; }
  .no { color: #ef4444; }

  img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
  }

  .hero {
    height: 200px;
    border-radius: 14px;
    background-size: cover;
    background-position: center;
  }

  canvas {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
  }
</style>
</head>

<body>

<header>
  <h1>🦀 Delaware Crabbing Intelligence</h1>
  <div class="sub">Indian River Inlet • Tide + Wind + Bite Forecast</div>
</header>

<div class="container">

  <!-- WEATHER -->
  <div class="card">
    <div class="label">Live Weather (Indian River Inlet)</div>
    <div class="big" id="temp">Loading...</div>
    <div class="row">
      <div id="wind">Wind: --</div>
      <div id="dir">Dir: --</div>
    </div>
  </div>

  <!-- ALERT -->
  <div class="card">
    <div class="label">Crabbing Alert</div>
    <div class="status" id="alert">Calculating...</div>
    <div id="reason" style="margin-top:8px; opacity:0.8;"></div>
  </div>

  <!-- TIDES -->
  <div class="card">
    <div class="label">Tide (Next High/Low Cycle)</div>
    <div id="tideText">Loading tides...</div>
    <canvas id="tideChart"></canvas>
  </div>

  <!-- INLET IMAGE -->
  <div class="card">
    <div class="label">Indian River Inlet</div>
    <div class="hero"
      style="background-image:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1400&q=60');">
    </div>
  </div>

  <!-- CRAB IMAGE -->
  <div class="card">
    <div class="label">Blue Crab</div>
    <img src="https://images.unsplash.com/photo-1600628422019-6c8d1b2f8b4d?auto=format&fit=crop&w=1400&q=60"/>
  </div>

</div>

<script>

let weatherData = {};
let tideData = [];

/* ---------------- WEATHER ---------------- */
async function getWeather() {
  const lat = 38.6109;
  const lon = -75.0696;

  const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current_weather=true&temperature_unit=fahrenheit`;

  const res = await fetch(url);
  const data = await res.json();

  const w = data.current_weather;

  weatherData = {
    temp: w.temperature,
    wind: w.windspeed,
    dir: w.winddirection
  };

  document.getElementById("temp").innerText = `${Math.round(w.temperature)}°F`;
  document.getElementById("wind").innerText = `Wind: ${Math.round(w.windspeed)} mph`;
  document.getElementById("dir").innerText = `Dir: ${Math.round(w.winddirection)}°`;

  updateBiteScore();
}

/* ---------------- TIDES (NOAA) ---------------- */
async function getTides() {
  const station = "8557860"; // Indian River Inlet

  const url =
    `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter` +
    `?product=predictions&application=NOS.COOPS.TAC.WL` +
    `&station=${station}&interval=hilo&format=json`;

  const res = await fetch(url);
  const data = await res.json();

  tideData = data.predictions.slice(0, 6);

  let text = "";
  tideData.forEach(t => {
    text += `${t.t} • ${t.type} • ${parseFloat(t.v).toFixed(1)} ft\n`;
  });

  document.getElementById("tideText").innerText = text;

  drawTideChart();
  updateBiteScore();
}

/* ---------------- TIDE CHART ---------------- */
function drawTideChart() {
  const canvas = document.getElementById("tideChart");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = 120;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!tideData.length) return;

  const max = Math.max(...tideData.map(t => parseFloat(t.v)));
  const min = Math.min(...tideData.map(t => parseFloat(t.v)));

  const w = canvas.width / tideData.length;

  tideData.forEach((t, i) => {
    const val = parseFloat(t.v);

    const h = ((val - min) / (max - min)) * 100 + 10;

    ctx.fillStyle = t.type === "H" ? "#22c55e" : "#ef4444";
    ctx.fillRect(i * w + 10, 110 - h, w - 20, h);

    ctx.fillStyle = "#fff";
    ctx.font = "10px Arial";
    ctx.fillText(t.type, i * w + 15, 115);
  });
}

/* ---------------- BITE MODEL ---------------- */
function updateBiteScore() {
  if (!weatherData.temp || !tideData.length) return;

  const temp = weatherData.temp;
  const wind = weatherData.wind;

  // simple heuristic
  let score = 50;

  // temp sweet spot 65–80
  if (temp >= 65 && temp <= 80) score += 20;
  else score -= 15;

  // wind penalty
  if (wind < 10) score += 15;
  else if (wind < 18) score += 5;
  else score -= 20;

  // tide bonus (incoming high tide proximity)
  const next = tideData[0];
  if (next && next.type === "H") score += 15;

  let status = "MARGINAL";
  let cls = "";

  if (score >= 70) {
    status = "GO 🟢 BEST TIME TO CRAB";
    cls = "go";
  } else if (score >= 50) {
    status = "DECENT 🟡 WORTH TRYING";
  } else {
    status = "NO GO 🔴 POOR CONDITIONS";
    cls = "no";
  }

  document.getElementById("alert").innerText = status;
  document.getElementById("alert").className = "status " + cls;

  document.getElementById("reason").innerText =
    `Score: ${score} • Temp ${temp}°F • Wind ${wind} mph`;
}

/* ---------------- INIT ---------------- */
async function init() {
  await Promise.all([getWeather(), getTides()]);
}

init();

// refresh weather every 10 min
setInterval(getWeather, 600000);

// refresh tides every hour
setInterval(getTides, 3600000);

</script>

</body>
</html>
