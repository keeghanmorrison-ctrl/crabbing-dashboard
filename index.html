<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Crabbing Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #061824;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.header {
  padding: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg, #0aa, #064);
  margin-bottom: 15px;
}

.header h1 {
  margin: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 14px;
  backdrop-filter: blur(10px);
}

h2 {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 1px;
}

.big {
  font-size: 2.2rem;
  font-weight: bold;
}

.good { color: #4ade80; }
.mid { color: #facc15; }
.bad { color: #f87171; }

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  margin: 6px 0;
  opacity: 0.9;
}

footer {
  text-align: center;
  opacity: 0.5;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🦀 Live Crabbing Dashboard</h1>
    <p>NOAA tides + real weather for Delaware waters</p>
  </div>

  <div class="grid">

    <div class="card">
      <h2>CRAB SCORE</h2>
      <div id="score" class="big">--</div>
      <div id="rating">Loading...</div>
    </div>

    <div class="card">
      <h2>WEATHER</h2>
      <ul id="weather">
        <li>Loading weather...</li>
      </ul>
    </div>

    <div class="card">
      <h2>TEMPERATURE</h2>
      <div id="temp" class="big">--</div>
    </div>

    <div class="card">
      <h2>TIDES (NOAA)</h2>
      <ul id="tides">
        <li>Loading tides...</li>
      </ul>
    </div>

    <div class="card">
      <h2>CRAB WINDOW</h2>
      <div id="window">Calculating...</div>
    </div>

  </div>

  <footer>
    Powered by Open-Meteo + NOAA CO-OPS
  </footer>

</div>

<script>

// =========================
// LOCATION (Ocean View, DE)
// =========================
const lat = 38.545;
const lon = -75.085;

// NOAA station (Lewes, DE – closest reliable tide station)
const station = "8557380";

// =========================
// WEATHER (OPEN-METEO)
// =========================
async function getWeather() {
  const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code`;

  const res = await fetch(url);
  const data = await res.json();

  const temp = data.current.temperature_2m;
  const wind = data.current.wind_speed_10m;

  document.getElementById("temp").innerText = temp + "°F";

  document.getElementById("weather").innerHTML = `
    <li>🌡️ Temp: ${temp}°F</li>
    <li>💨 Wind: ${wind} mph</li>
  `;

  return { temp, wind };
}

// =========================
// NOAA TIDES
// =========================
async function getTides() {
  const url =
    `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter` +
    `?product=predictions&application=NOS.COOPS.TAC.WL` +
    `&begin_date=today&end_date=today` +
    `&datum=MLLW&station=${station}` +
    `&time_zone=lst_ldt&units=english&format=json`;

  const res = await fetch(url);
  const data = await res.json();

  return data.predictions || [];
}

function renderTides(tides) {
  if (!tides.length) {
    document.getElementById("tides").innerHTML =
      "<li>No tide data available</li>";
    return;
  }

  let html = "";

  // show next 6 tide predictions
  for (let i = 0; i < Math.min(6, tides.length); i++) {
    html += `<li>🌊 ${tides[i].t}</li>`;
  }

  document.getElementById("tides").innerHTML = html;
}

// =========================
// CRAB SCORE MODEL
// =========================
function calculateScore(temp, wind) {
  let score = 50;

  if (temp >= 65 && temp <= 85) score += 20;
  else score -= 10;

  if (wind < 10) score += 15;
  else score -= 10;

  // small randomness replaced later by tide strength logic
  score += Math.random() * 10;

  score = Math.max(0, Math.min(100, Math.round(score)));

  let rating = "OK";
  let color = "mid";

  if (score >= 70) {
    rating = "GOOD";
    color = "good";
  } else if (score < 40) {
    rating = "POOR";
    color = "bad";
  }

  document.getElementById("score").innerText = score;
  document.getElementById("rating").innerHTML =
    `<span class="${color}">${rating}</span>`;
}

// =========================
// CRAB WINDOW (TIME BASED)
// =========================
function crabWindow() {
  const hour = new Date().getHours();

  let msg = "Moderate activity";

  if (hour >= 5 && hour <= 9) msg = "🔥 Morning bite window";
  if (hour >= 17 && hour <= 21) msg = "🔥 Evening peak window";
  if (hour >= 10 && hour <= 15) msg = "⚠️ Slow midday period";

  document.getElementById("window").innerText = msg;
}

// =========================
// INIT
// =========================
async function init() {
  const weather = await getWeather();
  calculateScore(weather.temp, weather.wind);
  crabWindow();

  const tides = await getTides();
  renderTides(tides);
}

init();

</script>

</body>
</html>
