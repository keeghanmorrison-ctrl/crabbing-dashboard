<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Crabbing Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a2a43, #0e4d64);
      color: white;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h2 { margin-top: 0; }
  </style>
</head>

<body>
  <h1 style="text-align:center;">Crabbing Dashboard</h1>

  <div class="container">
    <div class="card" id="weatherCard">
      <h2>Weather</h2>
      <div id="weather"></div>
    </div>

    <div class="card" id="tideCard">
      <h2>Tide Info</h2>
      <div id="tides"></div>
    </div>

    <div class="card" id="solunarCard">
      <h2>Solunar Activity</h2>
      <div id="solunar"></div>
    </div>
  </div>

<script>
// ---------------- WEATHER ----------------
async function loadWeather() {
  const url = "https://api.open-meteo.com/v1/forecast?latitude=38.54&longitude=-75.06&current_weather=true";
  const data = await fetch(url).then(r => r.json());
  const w = data.current_weather;

  document.getElementById("weather").innerHTML = `
    Temp: ${w.temperature}°F<br>
    Wind: ${w.windspeed} mph<br>
    Conditions: ${w.weathercode}
  `;
}

// ---------------- TIDES ----------------
async function loadTides() {
  const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=8555889&product=predictions&datum=MLLW&time_zone=lst_ldt&units=english&interval=hilo&format=json";
  const data = await fetch(url).then(r => r.json());

  let html = "";
  data.predictions.forEach(t => {
    html += `${t.t} — ${t.type} tide at ${t.v} ft<br>`;
  });

  document.getElementById("tides").innerHTML = html;
}

// ---------------- SOLUNAR ----------------
async function loadSolunar() {
  const url = "https://api.solunar.org/solunar/38.54,-75.06/today";
  const data = await fetch(url).then(r => r.json());

  document.getElementById("solunar").innerHTML = `
    Major: ${data.major1.start}–${data.major1.end}<br>
    Minor: ${data.minor1.start}–${data.minor1.end
