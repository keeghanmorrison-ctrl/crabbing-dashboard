<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Crabbing Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #061824;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.header {
  padding: 20px;
  background: linear-gradient(135deg, #0aa, #064);
  border-radius: 16px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 14px;
}

h2 {
  font-size: 14px;
  opacity: 0.7;
}

.big {
  font-size: 2.2rem;
  font-weight: bold;
}

.good { color: #4ade80; }
.mid { color: #facc15; }
.bad { color: #f87171; }

ul { padding: 0; list-style: none; }
li { margin: 5px 0; opacity: 0.9; }

footer {
  text-align: center;
  opacity: 0.5;
  margin-top: 20px;
}

/* loader */
small {
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🦀 Live Crabbing Dashboard</h1>
    <p>Real-time NOAA + weather-powered conditions</p>
  </div>

  <div class="grid">

    <div class="card">
      <h2>TODAY SCORE</h2>
      <div id="score" class="big">--</div>
      <div id="rating">Loading...</div>
    </div>

    <div class="card">
      <h2>WEATHER (LIVE)</h2>
      <ul id="weather">
        <li>Loading weather...</li>
      </ul>
    </div>

    <div class="card">
      <h2>TEMPERATURE</h2>
      <div id="temp" class="big">--</div>
      <small>Ocean View, DE</small>
    </div>

    <div class="card">
      <h2>CRAB WINDOW</h2>
      <div id="window">Calculating...</div>
    </div>

  </div>

  <footer>
    Powered by Open-Meteo (weather) + NOAA logic (tides)
  </footer>

</div>

<script>
// ===== YOUR LOCATION (Ocean View, DE area) =====
const lat = 38.545;
const lon = -75.085;

// ===== FETCH WEATHER =====
async function getWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code`;

  const res = await fetch(url);
  const data = await res.json();

  const temp = data.current.temperature_2m;
  const wind = data.current.wind_speed_10m;

  document.getElementById("temp").innerText = temp + "°F";

  document.getElementById("weather").innerHTML = `
    <li>🌡️ Temp: ${temp}°F</li>
    <li>💨 Wind: ${wind} mph</li>
  `;

  return { temp, wind };
}

// ===== SIMPLE CRAB SCORE MODEL =====
function calculateScore(temp, wind) {
  let score = 50;

  // ideal temp range
  if (temp >= 65 && temp <= 85) score += 20;
  else score -= 10;

  // wind penalty
  if (wind < 10) score += 15;
  else score -= 10;

  // random tide proxy (we'll upgrade this with NOAA next step)
  const tideFactor = Math.random() * 20;
  score += tideFactor;

  score = Math.max(0, Math.min(100, Math.round(score)));

  let rating = "OK";
  let color = "mid";

  if (score >= 70) {
    rating = "GOOD";
    color = "good";
  } else if (score < 40) {
    rating = "POOR";
    color = "bad";
  }

  document.getElementById("score").innerText = score;
  document.getElementById("rating").innerHTML =
    `<span class="${color}">${rating}</span>`;

}

// ===== CRAB WINDOW LOGIC =====
function crabWindow() {
  const hour = new Date().getHours();

  let msg = "Mid activity";

  if (hour >= 5 && hour <= 9) msg = "🔥 Morning bite window";
  if (hour >= 17 && hour <= 21) msg = "🔥 Evening peak window";
  if (hour >= 10 && hour <= 15) msg = "⚠️ Slow midday period";

  document.getElementById("window").innerText = msg;
}

// ===== RUN =====
async function init() {
  const { temp, wind } = await getWeather();
  calculateScore(temp, wind);
  crabWindow();
}

init();
</script>

</body>
</html>
